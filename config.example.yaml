# Prism 配置文件
# 
# 本文件由用户的 OpenClaw Agent 在安装时自动填写。
# Agent 读取 SKILL.md → 向用户收集必要信息 → 生成 config.yaml。
#
# Agent 操作步骤：
#   1. cp config.example.yaml config.yaml
#   2. 向用户询问以下信息并填入 config.yaml
#   3. 运行 python3 main.py setup
#   4. 运行 python3 main.py cron-setup
#
# config.yaml 已被 gitignore，不会提交到 git。

# ── 飞书 Bot 配置（必填）──────────────────────────────────────────────────────
# Agent 需要向用户询问：飞书自建应用的 App ID、App Secret、目标用户 Open ID。
# 注意：Open ID 跟 App 绑定，不同 App 的同一用户 Open ID 不同。
feishu:
  app_id: ""          # 飞书开放平台 → 自建应用 → App ID
  app_secret: ""      # 飞书开放平台 → 自建应用 → App Secret
  target_user_open_id: ""  # 该 App 下目标用户的 Open ID

# ── LLM API 配置（必填）──────────────────────────────────────────────────────
# Agent 需要向用户询问：LLM API 地址和 Key。
# 如果用户的 OpenClaw 已配置 models.json，可从中自动读取，无需重复填写。
llm:
  endpoint: ""        # OpenAI 兼容 API 地址，如 https://api.openai.com/v1
  api_key: ""         # API Key
  default_model: "claude-sonnet-4-6"    # 日常任务
  fast_model: "claude-haiku-4-5"        # 轻量任务

# ── 晨间 Brief 推送（必填）──────────────────────────────────────────────────
brief:
  target_user_id: ""  # 与 feishu.target_user_open_id 相同，Brief 推送目标

# ── 数据源配置（按需启用）────────────────────────────────────────────────────
# Agent 根据用户描述的需求决定启用哪些数据源。
# 未启用的数据源会被跳过，不影响系统运行。
sources:
  audio:
    enabled: false    # 录音转写服务（需要外部 API）
    api_url: ""
    api_key: ""
  stock:
    enabled: false    # A股监控
    watchlist: []     # 如 ["600519", "000858"]

# ── 可选功能（按需启用）──────────────────────────────────────────────────────
# Agent 根据用户的硬件和需求决定启用哪些功能。
features:
  camera:
    enabled: false    # 树莓派摄像头
    rotation: 0       # 物理倒置时设 180
  mijia:
    enabled: false    # 米家智能家居
    username: ""
    password: ""
    region: "cn"
  screen:
    enabled: false    # SPI 状态屏
    fb_path: "/dev/fb0"
  xiaohongshu:
    enabled: false    # 小红书发布

# ── 每晚自主执行 ────────────────────────────────────────────────────────────
# Agent 创建 OpenClaw cron 时使用这些配置。
# Prompt 模板在 src/prompts/nightly_execution.md，可 git 管理和迭代。
nightly:
  enabled: true
  schedule: "30 0 * * *"      # 每天 00:30
  model: "litellm/pa/claude-sonnet-4-6"
  timeout_seconds: 25200      # 7 小时

# ── 服务池 ──────────────────────────────────────────────────────────────────
# setup 时自动从 src/templates/service_pool.example.json 初始化。
# Agent 根据用户需求自定义服务内容。
service_pool:
  auto_init: true

# ── 系统配置 ────────────────────────────────────────────────────────────────
system:
  timezone: "Asia/Shanghai"
  workspace: "~/.openclaw/workspace"
  log_level: "INFO"
